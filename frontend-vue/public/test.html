<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test { 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 5px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🔬 LLMScope 测试页面</h1>
    
    <div id="results"></div>
    
    <h2>手动测试</h2>
    <button onclick="testBackend()">测试后端连接</button>
    <button onclick="testWebSocket()">测试 WebSocket</button>
    <button onclick="window.location.href='/'">返回主页</button>

    <script src="/config.js"></script>
    <script>
        const results = document.getElementById('results');
        
        function addResult(message, isSuccess) {
            const div = document.createElement('div');
            div.className = `test ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            results.appendChild(div);
        }

        // 自动测试
        if (window.LLMSCOPE_CONFIG) {
            addResult('✓ 配置加载成功: ' + JSON.stringify(window.LLMSCOPE_CONFIG), true);
        } else {
            addResult('✗ 配置未加载', false);
        }

        // 测试后端
        function testBackend() {
            const apiUrl = window.LLMSCOPE_CONFIG?.apiBaseUrl || 'http://localhost:8080';
            addResult('正在测试: ' + apiUrl + '/health', true);
            
            fetch(apiUrl + '/health')
                .then(res => res.json())
                .then(data => {
                    addResult('✓ 后端响应: ' + JSON.stringify(data), true);
                })
                .catch(err => {
                    addResult('✗ 后端错误: ' + err.message, false);
                });
        }

        // 测试 WebSocket
        function testWebSocket() {
            const wsUrl = window.LLMSCOPE_CONFIG?.wsUrl || 'ws://localhost:8080/ws';
            addResult('正在连接: ' + wsUrl, true);
            
            try {
                const ws = new WebSocket(wsUrl);
                ws.onopen = () => {
                    addResult('✓ WebSocket 连接成功', true);
                    ws.close();
                };
                ws.onerror = (err) => {
                    addResult('✗ WebSocket 错误', false);
                };
            } catch (err) {
                addResult('✗ WebSocket 异常: ' + err.message, false);
            }
        }

        // 自动测试后端
        testBackend();
    </script>
</body>
</html>
