version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - LLAMA_CPP_HOST=llama-cpp
      - LLAMA_CPP_PORT=8081
    depends_on:
      - llama-cpp

  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "8081:8081"
    volumes:
      - ./models:/models
    command: >
      --server
      --host 0.0.0.0
      --port 8081
      --model /models/model.gguf
